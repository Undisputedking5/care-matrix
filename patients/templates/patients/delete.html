{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="card p-4 shadow-sm text-center">
        <h4>Delete Patient</h4>
        <p>Are you sure you want to delete <strong>{{ patient.first_name }} {{ patient.last_name }}</strong>?</p>
        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'patients:patient_detail' patient.id %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
