{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="card shadow-sm p-4">
        <h3 class="mb-3">Update Patient</h3>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label>First Name</label>
                <input type="text" name="first_name" value="{{ patient.first_name }}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Last Name</label>
                <input type="text" name="last_name" value="{{ patient.last_name }}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Date of Birth</label>
                <input type="date" name="date_of_birth" value="{{ patient.date_of_birth }}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Gender</label>
                <select name="gender" class="form-control" required>
                    <option value="Male" {% if patient.gender == 'Male' %}selected{% endif %}>Male</option>
                    <option value="Female" {% if patient.gender == 'Female' %}selected{% endif %}>Female</option>
                </select>
            </div>
            <div class="mb-3">
                <label>Phone</label>
                <input type="text" name="phone" value="{{ patient.phone }}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Address</label>
                <input type="text" name="address" value="{{ patient.address }}" class="form-control">
            </div>
            <button type="submit" class="btn btn-warning">Update Patient</button>
            <a href="{% url 'patients:patient_detail' patient.id %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
