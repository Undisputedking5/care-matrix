{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8 col-lg-6">
        <div class="content-card shadow-sm p-4">
            <h4 class="mb-4 text-light">Add New Bed</h4>
            <div>
                    <div class="mb-3 pb-3 border-bottom">
                        <p class="text-muted mb-0"><strong>Ward:</strong> {{ ward.name }} ({{ ward.ward_type }})</p>
                    </div>

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="bed_number" class="form-label">Bed Number *</label>
                            <input type="text" class="form-control" id="bed_number" name="bed_number" required placeholder="e.g., A-001, ICU-1">
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success">Add Bed</button>
                            <a href="{% url 'patients:ward_detail' ward.pk %}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
