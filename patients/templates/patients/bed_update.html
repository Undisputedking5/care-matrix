{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-info text-white">
                    <h4 class="mb-0">Update Bed</h4>
                </div>
                <div class="card-body">
                    <div class="mb-3 pb-3 border-bottom">
                        <p class="text-muted mb-0"><strong>Ward:</strong> {{ bed.ward.name }}</p>
                    </div>

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="bed_number" class="form-label">Bed Number *</label>
                            <input type="text" class="form-control" id="bed_number" name="bed_number" required value="{{ bed.bed_number }}">
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-info">Update Bed</button>
                            <a href="{% url 'patients:ward_detail' bed.ward.pk %}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
