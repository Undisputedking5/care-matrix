{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-8 col-lg-6">
    <div class="content-card p-4 shadow-sm">
      <h3 class="mb-4">Add Vitals for {{ patient.first_name }} {{ patient.last_name }}</h3>
      <form method="POST">{% csrf_token %}
    <div class="mb-3"><label>Weight (kg)</label><input name="weight" class="form-control" step="0.1" required></div>
    <div class="mb-3"><label>Height (m)</label><input name="height" class="form-control" step="0.01" required></div>
    <div class="mb-3"><label>BP Systolic</label><input name="blood_pressure_systolic" class="form-control" required></div>
    <div class="mb-3"><label>BP Diastolic</label><input name="blood_pressure_diastolic" class="form-control" required></div>
    <div class="mb-3"><label>Pulse (bpm)</label><input name="pulse" class="form-control" required></div>
    <div class="mb-3"><label>Temperature (°C)</label><input name="temperature" class="form-control" step="0.1" required></div>
    <button type="submit" class="btn btn-success">Add Vitals</button>
    <a href="{% url 'patients:patient_detail' patient.id %}" class="btn btn-secondary">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
