{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="content-card shadow-sm p-4">
                <h3 class="mb-3">Add New Patient</h3>
                <form method="POST">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="required">First Name</label>
                    <input type="text" name="first_name" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="required">Last Name</label>
                    <input type="text" name="last_name" class="form-control" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="required">Date of Birth</label>
                    <input type="date" name="date_of_birth" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="required">Gender</label>
                    <select name="gender" class="form-select" required>
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="required">Phone Number</label>
                    <input type="text" name="phone" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label>Address</label>
                    <input type="text" name="address" class="form-control" placeholder="Optional">
                </div>
            </div>
            <div class="mb-4">
                <label>Assigned Doctor (From Reception/Desk)</label>
                 <select name="doctor" class="form-select">
                    <option value="">-- No specific doctor --</option>
                    {% for doc in doctors %}
                        <option value="{{ doc.user.get_full_name|default:doc.user.username }}">{{ doc.user.get_full_name|default:doc.user.username }} ({{ doc.department|default:"General" }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-danger px-4">Add Patient</button>
                <a href="{% url 'patients:patient_list' %}" class="btn btn-light px-4">Cancel</a>
            </div>
        </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
