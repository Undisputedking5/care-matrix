{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="content-card shadow-sm p-4">
                <h4 class="mb-4 text-light">Create New Ward</h4>
                <div>
                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="name" class="form-label">Ward Name *</label>
                            <input type="text" class="form-control" id="name" name="name" required placeholder="e.g., General Ward A">
                        </div>

                        <div class="mb-3">
                            <label for="ward_type" class="form-label">Ward Type *</label>
                            <select class="form-select" id="ward_type" name="ward_type" required>
                                <option value="">Select Ward Type</option>
                                {% for value, label in ward_types %}
                                    <option value="{{ value }}">{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="capacity" class="form-label">Capacity (Number of Beds) *</label>
                            <input type="number" class="form-control" id="capacity" name="capacity" min="1" required placeholder="e.g., 20">
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Create Ward</button>
                            <a href="{% url 'patients:ward_list' %}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
