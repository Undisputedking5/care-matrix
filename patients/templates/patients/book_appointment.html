{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8 col-lg-6">
        <div class="content-card shadow-sm p-4">
            <h4 class="mb-4 text-light border-bottom border-secondary pb-3">
                📅 Book Appointment
                <small class="d-block text-white-50 fs-6 fw-normal mt-1">Patient: {{ patient.first_name }} {{ patient.last_name }}</small>
            </h4>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label text-white-50">Doctor <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="doctor" placeholder="e.g. Dr. Jane Doe" value="{{ patient.doctor }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-white-50">Appointment Date <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" name="appointment_date" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-white-50">Appointment Time <span class="text-danger">*</span></label>
                    <input type="time" class="form-control" name="appointment_time" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-white-50">Reason for Visit <span class="text-danger">*</span></label>
                    <textarea class="form-control" name="reason" rows="3" placeholder="e.g. Follow-up on BP medication..." required></textarea>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Book Appointment</button>
                    <a href="{% url 'patients:patient_detail' patient.pk %}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
