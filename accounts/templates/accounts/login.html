{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareMatrix - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #1a1a1a;
            --accent-red: #dc3545;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --text-main: #f8f9fa;
        }
        body {
            background: radial-gradient(circle at center, #2c3e50 0%, #000000 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
        }
        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .brand-name {
            font-weight: 600;
            letter-spacing: -1px;
            color: var(--accent-red);
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        .login-type-toggle {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 4px;
            display: flex;
            margin-bottom: 2rem;
        }
        .login-type-toggle input {
            display: none;
        }
        .login-type-toggle label {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 500;
            margin: 0;
        }
        .login-type-toggle input:checked + label {
            background: var(--accent-red);
            color: white;
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.3);
        }
        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px 16px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent-red);
            box-shadow: 0 0 0 4px rgba(220, 53, 69, 0.15);
            color: white;
        }
        .btn-login {
            background: var(--accent-red);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            margin-top: 1rem;
            transition: all 0.3s ease;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(220, 53, 69, 0.4);
            background: #c82333;
        }
        .alert {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: #ff8787;
            border-radius: 12px;
            font-size: 0.9rem;
        }
        .help-text {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="text-center mb-4">
        <h1 class="brand-name">CareMatrix</h1>
        <p class="text-white-50">Healthcare Management System</p>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-dismissible fade show mb-3" role="alert">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST" id="loginForm">
        {% csrf_token %}
        
        <div class="login-type-toggle">
            <input type="radio" name="login_type" id="typeDoctor" value="doctor" checked>
            <label for="typeDoctor">Doctor</label>
            
            <input type="radio" name="login_type" id="typeAdmin" value="admin">
            <label for="typeAdmin">Admin</label>
        </div>

        <div id="usernameField" style="display: none;">
            <div class="mb-3">
                <label class="form-label small text-white-50">Username</label>
                <input type="text" class="form-control" name="username" placeholder="Enter admin username">
            </div>
        </div>

        <div class="mb-4">
            <label id="passwordLabel" class="form-label small text-white-50">Unique Doctor ID</label>
            <input type="password" class="form-control" name="password" id="passwordInput" placeholder="Enter your ID" required>
        </div>

        <button type="submit" class="btn btn-danger w-100 btn-login">Sign In</button>
    </form>

    <div class="help-text text-center">
        For support, contact the system administrator.<br>
        <a href="{% url 'accounts:signup' %}" class="text-white-50 text-decoration-none mt-2 d-inline-block small">Request Access</a>
    </div>
</div>

<script>
    const typeDoctor = document.getElementById('typeDoctor');
    const typeAdmin = document.getElementById('typeAdmin');
    const usernameField = document.getElementById('usernameField');
    const passwordLabel = document.getElementById('passwordLabel');
    const passwordInput = document.getElementById('passwordInput');

    function updateForm() {
        if (typeAdmin.checked) {
            usernameField.style.display = 'block';
            usernameField.querySelector('input').required = true;
            passwordLabel.innerText = 'Admin Password';
            passwordInput.placeholder = 'Enter admin password';
        } else {
            usernameField.style.display = 'none';
            usernameField.querySelector('input').required = false;
            passwordLabel.innerText = 'Unique Doctor ID';
            passwordInput.placeholder = 'Enter your ID';
        }
    }

    typeDoctor.addEventListener('change', updateForm);
    typeAdmin.addEventListener('change', updateForm);
</script>
</body>
</html>
