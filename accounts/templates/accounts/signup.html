{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CareMatrix - Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to bottom right , #2c3424, #4c583e, #768064);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #E5C5C1;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            border-radius: 1rem;
            padding: 2rem;
            width: 350px;
            backdrop-filter: blur(10px);
        }
        .form-control {
            border-radius: 0.5rem;
        }
        button {
            border-radius: 0.5rem;
        }
        .messages {
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
<div class="card">
    <h2 class="text-center mb-4">CareMatrix</h2>
    <div class="messages">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-warning py-1 px-2">{{ message }}</div>
            {% endfor %}
        {% endif %}
    </div>
    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <input type="text" class="form-control" name="username" placeholder="Username" required>
        </div>
        <div class="mb-3">
            <input type="email" class="form-control" name="email" placeholder="Email" required>
        </div>
        <div class="mb-3">
            <input type="password" class="form-control" name="password" placeholder="Password" required>
        </div>
        <div class="mb-3">
            <input type="password" class="form-control" name="confirm_password" placeholder="Confirm Password" required>
        </div>
        <button type="submit" class="btn btn-warning w-100">Sign Up</button>
    </form>
    <p class="mt-3 text-center">
        Already have an account? <a href="{% url 'accounts:login' %}" class="text-success">Login</a>
    </p>
</div>
</body>
</html>
