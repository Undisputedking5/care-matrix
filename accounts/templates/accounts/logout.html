{% extends "base.html" %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-sm p-5 text-center" style="max-width: 450px; width: 100%;">
        <h2 class="mb-4 text-warning">LOG OUT CONFIRMATION</h2>
        <p class="mb-4">Are you sure you want to log out of CareMatrix?</p>
        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger btn-lg w-100 mb-2">YES</button>
            <a href="{% url 'dashboard:dashboard_home' %}" class="btn btn-secondary btn-lg w-100">NO</a>
        </form>
    </div>
</div>
{% endblock %}
